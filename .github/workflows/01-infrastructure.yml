# Phase 4 — Wiz exercise: Terraform + Snyk IaC gate (continue-on-error per plan).
#
# Secrets (Settings → Secrets and variables → Actions):
#   GCP_SA_KEY           — JSON key for a SA that can run Terraform in the target project.
#   SNYK_TOKEN           — Snyk token (optional if you remove the Snyk step).
#   GCP_PROJECT_ID       — passed as TF_VAR_project_id.
#   DB_ADMIN_PASSWORD    — passed as TF_VAR_db_admin_password (Mongo VM).
#
# Variables (optional — if unset, Terraform uses defaults in variables.tf):
#   GCP_REGION           — set as TF_VAR_region (e.g. australia-southeast1).
#   GCP_ZONE             — set as TF_VAR_zone (e.g. australia-southeast1-a).
name: 01 — Infrastructure

on:
  push:
    branches: [main]
    paths:
      - "terraform/**"
      - ".github/workflows/01-infrastructure.yml"
  workflow_dispatch:

permissions:
  contents: read

env:
  TF_IN_AUTOMATION: true

jobs:
  terraform:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Install Snyk CLI
        run: npm install -g snyk

      - name: Snyk IaC (continue on error)
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        working-directory: terraform
        run: snyk iac test . --severity-threshold=low

      - name: Terraform init
        working-directory: terraform
        run: terraform init

      - name: Terraform plan
        working-directory: terraform
        env:
          TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID }}
          TF_VAR_db_admin_password: ${{ secrets.DB_ADMIN_PASSWORD }}
          TF_VAR_region: ${{ vars.GCP_REGION }}
          TF_VAR_zone: ${{ vars.GCP_ZONE }}
        run: terraform plan -out=tfplan -input=false

      - name: Terraform apply
        working-directory: terraform
        env:
          TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID }}
          TF_VAR_db_admin_password: ${{ secrets.DB_ADMIN_PASSWORD }}
          TF_VAR_region: ${{ vars.GCP_REGION }}
          TF_VAR_zone: ${{ vars.GCP_ZONE }}
        run: terraform apply -auto-approve -input=false tfplan
