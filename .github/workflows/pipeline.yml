# Only: `snyk iac test terraform/` and `snyk container test …` (no Terraform CLI, no Docker build, no deploy).
#
# Secret: SNYK_TOKEN
name: Pipeline

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  security-can:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Snyk CLI
        uses: snyk/actions/setup@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: snyk iac test && snyk container test
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          snyk iac test terraform --severity-threshold=high
          snyk container test australia-southeast1-docker.pkg.dev/clgcporg10-186/todoiz/todoiz-app:v1 --file=app/Dockerfile
  deploy:
    runs-on: ubuntu-latest
    needs: security-can
    steps:
      - run: echo "Run terraform plan, validate, apply"