# Intentionally insecure: workload SA bound to cluster-admin (exercise only).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: todoiz-sa
  namespace: todoiz
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: todoiz-cluster-admin
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: ServiceAccount
    name: todoiz-sa
    namespace: todoiz
